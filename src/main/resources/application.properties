# Server
server.port=${PORT:8080}

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:aiplatform;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway
spring.flyway.enabled=false

# H2 console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# App constants
app.mock.response.delay-ms=1200
app.plans.free.requests-per-minute=10
app.plans.free.tokens-per-month=50000
app.plans.pro.requests-per-minute=60
app.plans.pro.tokens-per-month=500000
