# Server
server.port=${PORT:8080}

# Database - Railway provides JDBC_DATABASE_URL automatically
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true

# App constants
app.mock.response.delay-ms=1200
app.plans.free.requests-per-minute=10
app.plans.free.tokens-per-month=50000
app.plans.pro.requests-per-minute=60
app.plans.pro.tokens-per-month=500000
